name: Ruleset CI

on:
  pull_request:
    paths:
      - 'rulesets/**'

jobs:
  lint-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Lint YARA rules
        run: |
          find rulesets/yara -name "*.yar" -o -name "*.yara" | xargs -r python ci/ruleset_validation/yara_linter.py

      - name: Lint Sigma rules
        run: |
          find rulesets/sigma -name "*.yml" -o -name "*.yaml" | xargs -r python ci/ruleset_validation/sigma_linter.py

      - name: Validate Network rules
        run: |
          find rulesets/network -name "*.rules" | xargs -r python ci/ruleset_validation/network_rule_validator.py
